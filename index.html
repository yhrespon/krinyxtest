<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test VPS Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 10px;
            font-size: 14px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Test VPS</h2>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">

    <button onclick="sendData()">Envoyer</button>

    <div class="result" id="result"></div>
</div>

<script>
function sendData() {
    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;

    fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ nom, prenom })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Reçu: " + data.nom + " " + data.prenom;
    });
}
</script>

</body>
</html>
